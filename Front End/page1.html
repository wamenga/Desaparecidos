<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="page1.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="">Início</a></li>
                 <li><a href="">Denúciar</a></li>
                  <li><a href="">Meus casos</a></li>
                   <li><a href="">Admin</a></li>
            </ul>
            <div class="user">Olá, João</div>
        </nav>
    </header>

    <section class="search">
        <input type="text" placeholder="Digite o nome...">
        <div class="filters">
            <button>Todos</button>
            <button>Em Inverstigação</button>
            <button>Encontrado</button>
            <button>Encerrado</button>
        </div>
    </section>

    <section class="destaque">
  <img src="ana.jpg" alt="Ana Souza">

  <div class="info">
    <h2>Ana Souza</h2>
    <p>Desaparecida desde: 15/04/2023</p>
    <p>Localização: São Paulo, SP</p>
    <span class="status">Em investigação</span>

    <button>Saiba Mais</button>
  </div>
</section>

<section class="casos">
  <article class="card">
    <img src="carlos.jpg">
    <h3>Carlos Pereira</h3>
    <p>Desaparecido desde 10/10/2022</p>
    <span class="status red">Em investigação</span>
    <button>Ver detalhes</button>
  </article>
</section>

<section class="actions">
  <button class="report">Reportar Desaparecimento</button>
  <button class="view-all">Ver Todos os Casos</button>
</section>

<footer>
  <p>© 2026 BusqueDesaparecidos</p>
</footer>
</body>
</html>
