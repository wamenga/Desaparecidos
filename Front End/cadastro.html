<!DOCTYPE html>
<html lang="pt-ao">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BusqueDesaparecidos Angola - Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="cadastro-wrapper">
        <div class="cadastro-container">
            <div class="logo-area">
                <i class="fas fa-user-plus logo-icon"></i>
                <h1>Criar Conta</h1>
                <span class="angola-badge">ANGOLA</span>
            </div>
            <p class="subtitle">Cadastre-se para ajudar a encontrar desaparecidos</p>
            
            <form id="cadastroForm">
                <div class="input-group" id="nomeGroup">
                    <label><i class="fas fa-user"></i> Nome completo *</label>
                    <input type="text" id="nome" placeholder="João Silva" autocomplete="off">
                    <div class="error-message"><i class="fas fa-exclamation-circle"></i> Digite seu nome completo</div>
                </div>
                
                <div class="input-group" id="emailGroupCad">
                    <label><i class="fas fa-envelope"></i> E-mail *</label>
                    <input type="email" id="email" placeholder="seu@email.ao" autocomplete="off">
                    <div class="error-message"><i class="fas fa-exclamation-circle"></i> Digite um e-mail válido</div>
                </div>
                
                <div class="row-inputs">
                    <div class="input-group" id="telefoneGroup">
                        <label><i class="fas fa-phone"></i> Telefone</label>
                        <input type="tel" id="telefone" placeholder="+244 923 456 789">
                        <div class="error-message"><i class="fas fa-exclamation-circle"></i> Digite um telefone válido</div>
                    </div>
                    
                    <div class="input-group" id="provinciaGroup">
                        <label><i class="fas fa-map-marker-alt"></i> Província</label>
                        <select id="provincia">
                            <option value="">Selecione sua província</option>
                            <option value="Luanda">Luanda</option>
                            <option value="Benguela">Benguela</option>
                            <option value="Huíla">Huíla</option>
                            <option value="Bié">Bié</option>
                            <option value="Moxico">Moxico</option>
                            <option value="Cuando Cubango">Cuando Cubango</option>
                            <option value="Zaire">Zaire</option>
                            <option value="Uíge">Uíge</option>
                            <option value="Cuanza Norte">Cuanza Norte</option>
                            <option value="Cuanza Sul">Cuanza Sul</option>
                            <option value="Namibe">Namibe</option>
                            <option value="Cabinda">Cabinda</option>
                            <option value="Lunda Norte">Lunda Norte</option>
                            <option value="Lunda Sul">Lunda Sul</option>
                            <option value="Malange">Malange</option>
                            <option value="Huambo">Huambo</option>
                            <option value="Bengo">Bengo</option>
                        </select>
                        <div class="error-message"><i class="fas fa-exclamation-circle"></i> Selecione uma província</div>
                    </div>
                </div>
                
                <div class="row-inputs">
                    <div class="input-group" id="senhaGroup">
                        <label><i class="fas fa-lock"></i> Senha *</label>
                        <input type="password" id="password" placeholder="••••••••">
                        <div class="error-message"><i class="fas fa-exclamation-circle"></i> A senha deve ter pelo menos 6 caracteres</div>
                    </div>
                    
                    <div class="input-group" id="confirmGroup">
                        <label><i class="fas fa-check-circle"></i> Confirmar senha *</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••">
                        <div class="error-message"><i class="fas fa-exclamation-circle"></i> As senhas não coincidem</div>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="cadastrarBtn">
                    <i class="fas fa-user-check"></i> Cadastrar
                </button>
            </form>
            
            <p class="register-link">
                Já tem uma conta? <a href="index.html">Faça login</a>
            </p>
        </div>
    </div>

    <!-- Toast de notificação -->
    <div class="toast-notification" id="toast">
        <i class="fas fa-info-circle"></i>
        <span id="toastMessage">Mensagem</span>
    </div>

    <script>
        const API_URL = 'http://localhost/projeto-desaparecidos/backend/';

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.innerHTML = message;
            toast.className = 'toast-notification show ' + type;
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        function createRipple(event) {
            const button = event.currentTarget;
            const ripple = document.createElement('span');
            const rect = button.getBoundingClientRect();
            const size = Math.max(rect.width, rect.height);
            const x = event.clientX - rect.left - size / 2;
            const y = event.clientY - rect.top - size / 2;
            
            ripple.style.width = ripple.style.height = `${size}px`;
            ripple.style.left = `${x}px`;
            ripple.style.top = `${y}px`;
            ripple.classList.add('ripple');
            
            button.appendChild(ripple);
            setTimeout(() => ripple.remove(), 600);
        }

        // Validação Nome
        const nomeInput = document.getElementById('nome');
        const nomeGroup = document.getElementById('nomeGroup');
        
        nomeInput.addEventListener('input', function() {
            if (this.value.trim() === '') {
                nomeGroup.classList.add('error');
                nomeGroup.classList.remove('success');
            } else if (this.value.trim().split(' ').length < 2) {
                nomeGroup.classList.add('error');
                nomeGroup.classList.remove('success');
            } else {
                nomeGroup.classList.add('success');
                nomeGroup.classList.remove('error');
            }
        });

        // Validação Email
        const emailInput = document.getElementById('email');
        const emailGroup = document.getElementById('emailGroupCad');
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        emailInput.addEventListener('input', function() {
            if (this.value === '') {
                emailGroup.classList.remove('error', 'success');
            } else if (!emailRegex.test(this.value)) {
                emailGroup.classList.add('error');
                emailGroup.classList.remove('success');
            } else {
                emailGroup.classList.add('success');
                emailGroup.classList.remove('error');
            }
        });

        // Validação Senha
        const senhaInput = document.getElementById('password');
        const senhaGroup = document.getElementById('senhaGroup');
        const confirmInput = document.getElementById('confirmPassword');
        const confirmGroup = document.getElementById('confirmGroup');
        
        senhaInput.addEventListener('input', function() {
            if (this.value === '') {
                senhaGroup.classList.remove('error', 'success');
            } else if (this.value.length < 6) {
                senhaGroup.classList.add('error');
                senhaGroup.classList.remove('success');
            } else {
                senhaGroup.classList.add('success');
                senhaGroup.classList.remove('error');
            }
            
            // Verificar se as senhas coincidem
            if (confirmInput.value !== '') {
                if (senhaInput.value === confirmInput.value && senhaInput.value.length >= 6) {
                    confirmGroup.classList.add('success');
                    confirmGroup.classList.remove('error');
                } else {
                    confirmGroup.classList.add('error');
                    confirmGroup.classList.remove('success');
                }
            }
        });
        
        confirmInput.addEventListener('input', function() {
            if (this.value === '') {
                confirmGroup.classList.remove('error', 'success');
            } else if (senhaInput.value !== this.value) {
                confirmGroup.classList.add('error');
                confirmGroup.classList.remove('success');
            } else if (senhaInput.value === this.value && senhaInput.value.length >= 6) {
                confirmGroup.classList.add('success');
                confirmGroup.classList.remove('error');
            }
        });

        // Submit do formulário
        const cadastroForm = document.getElementById('cadastroForm');
        const cadastrarBtn = document.getElementById('cadastrarBtn');

        cadastroForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const nome = nomeInput.value.trim();
            const email = emailInput.value.trim();
            const senha = senhaInput.value;
            const confirmar = confirmInput.value;
            const telefone = document.getElementById('telefone').value;
            const provincia = document.getElementById('provincia').value;
            
            let isValid = true;
            
            // Validar nome
            if (!nome || nome.split(' ').length < 2) {
                nomeGroup.classList.add('error');
                isValid = false;
            }
            
            // Validar email
            if (!email || !emailRegex.test(email)) {
                emailGroup.classList.add('error');
                isValid = false;
            }
            
            // Validar senha
            if (!senha || senha.length < 6) {
                senhaGroup.classList.add('error');
                isValid = false;
            }
            
            // Validar confirmação
            if (senha !== confirmar) {
                confirmGroup.classList.add('error');
                isValid = false;
            }
            
            if (!isValid) {
                showToast('Por favor, corrija os erros no formulário', 'error');
                return;
            }
            
            // Mostrar loading
            cadastrarBtn.classList.add('loading');
            const originalText = cadastrarBtn.innerHTML;
            cadastrarBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Cadastrando...';
            cadastrarBtn.disabled = true;
            
            const dados = { nome, email, senha, telefone, provincia };
            
            try {
                const response = await fetch(API_URL + 'cadastrar.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('Cadastro realizado com sucesso! Redirecionando para o login...', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showToast(data.erro || 'Erro ao cadastrar', 'error');
                    cadastrarBtn.classList.remove('loading');
                    cadastrarBtn.innerHTML = originalText;
                    cadastrarBtn.disabled = false;
                }
            } catch (error) {
                console.error('Erro:', error);
                showToast('Erro de conexão com o servidor', 'error');
                cadastrarBtn.classList.remove('loading');
                cadastrarBtn.innerHTML = originalText;
                cadastrarBtn.disabled = false;
            }
        });

        cadastrarBtn.addEventListener('click', createRipple);
    </script>
</body>
</html>
